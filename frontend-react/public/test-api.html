<!DOCTYPE html>
<html>
<head>
    <title>API Test - Solo Leveling</title>
    <style>
        body { background: #0a0f1b; color: #fff; font-family: Arial; padding: 20px; }
        .test { background: #1a2332; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #22ff88; }
        .success { border-left-color: #22ff88; }
        .error { border-left-color: #ff4444; }
        pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🧪 API Integration Test</h1>
    <p>Testing all public endpoints...</p>
    
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        const USER_ID = 1;
        const results = document.getElementById('results');
        
        async function testEndpoint(name, url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const status = response.ok ? 'success' : 'error';
                
                let html = `<div class="test ${status}">
                    <strong>${name}</strong> - Status: ${response.status}<br>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
                results.innerHTML += html;
                
                return { success: response.ok, data };
            } catch (error) {
                results.innerHTML += `<div class="test error">
                    <strong>${name}</strong> - ERROR<br>
                    <pre>${error.message}</pre>
                </div>`;
                return { success: false, error: error.message };
            }
        }
        
        async function runTests() {
            await testEndpoint('Get User', `${API_BASE}/public/users/${USER_ID}`);
            await testEndpoint('Get Missions', `${API_BASE}/public/missions/${USER_ID}`);
            await testEndpoint('Get Scoring', `${API_BASE}/public/scoring/${USER_ID}`);
            await testEndpoint('Get Streak', `${API_BASE}/public/streak/${USER_ID}`);
        }
        
        // Run tests on page load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runTests, 500);
        });
    </script>
</body>
</html>
