version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sololeveling-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=sqlite:///./data/sololeveling.db
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    networks:
      - sololeveling-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sololeveling-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000/api
      - BROWSER=none
      - CI=false
    volumes:
      - ./frontend-react:/app:cached
      - /app/node_modules
    networks:
      - sololeveling-net
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true

networks:
  sololeveling-net:
    driver: bridge
